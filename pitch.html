<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pitch Generator – DealGuardian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           CSS VARIABLES – Dark (default) & Light
           ============================================================ */
        :root {
            --bg-primary: #0c0e14;
            --bg-secondary: #11141c;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.14);
            --text-primary: #eceff4;
            --text-secondary: #9aa2b8;
            --text-muted: #5e667a;
            --accent: #6b7bff;
            --accent-dim: rgba(107, 123, 255, 0.12);
            --accent-glow: 0 12px 40px rgba(107, 123, 255, 0.15);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --header-bg: rgba(12, 14, 20, 0.85);
            --footer-border: rgba(255, 255, 255, 0.06);
            --radius-lg: 20px;
            --radius-md: 14px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f2f4f8;
            --bg-secondary: #e8ecf2;
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-card-hover: rgba(255, 255, 255, 0.9);
            --bg-input: rgba(255, 255, 255, 0.7);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.16);
            --text-primary: #1a1e2c;
            --text-secondary: #4a5268;
            --text-muted: #7a8298;
            --accent: #4a5bd8;
            --accent-dim: rgba(74, 91, 216, 0.10);
            --accent-glow: 0 12px 40px rgba(74, 91, 216, 0.15);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.06);
            --header-bg: rgba(242, 244, 248, 0.85);
            --footer-border: rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        /* ---------- HEADER / NAV ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--header-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            margin-bottom: 40px;
            transition: background 0.3s, border-color 0.3s;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }
        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.3s;
            text-decoration: none;
        }
        .nav-links a:hover {
            color: var(--text-primary);
        }
        .nav-links a.active {
            color: var(--accent);
            font-weight: 700;
        }

        .btn-outline-nav {
            padding: 6px 18px;
            border-radius: 60px;
            border: 1px solid var(--border-subtle);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        .btn-outline-nav:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        .btn-primary-nav {
            padding: 6px 22px;
            border-radius: 60px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-primary-nav:hover {
            background: #7b89ff;
            box-shadow: var(--accent-glow);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .theme-toggle .toggle-track {
            width: 40px;
            height: 22px;
            background: var(--bg-card);
            border-radius: 40px;
            position: relative;
            transition: background 0.3s;
            border: 1px solid var(--border-subtle);
        }
        .theme-toggle .toggle-track .toggle-dot {
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background 0.3s;
        }
        [data-theme="light"] .theme-toggle .toggle-track .toggle-dot {
            transform: translateX(18px);
        }
        .theme-toggle .toggle-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* ---------- MAIN CONTENT ---------- */
        .page-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        .page-sub {
            color: var(--text-secondary);
            font-size: 17px;
            margin-bottom: 28px;
        }

        .input-area {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border-subtle);
            transition: background 0.3s, border-color 0.3s;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: background 0.3s, border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            padding: 12px 34px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            box-shadow: 0 4px 16px rgba(107, 123, 255, 0.15);
        }
        .btn-primary:hover {
            background: #7b89ff;
            transform: translateY(-2px);
            box-shadow: var(--accent-glow);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        /* ---------- RESULTS ---------- */
        .results {
            margin-top: 32px;
            padding: 24px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            display: none;
            transition: background 0.3s, border-color 0.3s;
        }
        .results.visible {
            display: block;
        }

        .results h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .metric-grid {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .metric {
            background: var(--bg-card);
            padding: 14px 22px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            flex: 1 1 auto;
            min-width: 120px;
        }
        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
        .metric-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            margin-top: 2px;
        }

        .pain-list {
            margin: 16px 0 20px;
            padding-left: 20px;
            color: var(--text-secondary);
        }
        .pain-list li {
            margin-bottom: 4px;
        }

        .code-block {
            background: var(--bg-primary);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            border-left: 4px solid var(--accent);
            white-space: pre-wrap;
            font-family: 'Inter', monospace;
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.7;
            margin-top: 8px;
        }

        .btn-download {
            display: inline-block;
            background: transparent;
            color: var(--accent);
            padding: 8px 22px;
            border: 1px solid var(--accent);
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            text-decoration: none;
        }
        .btn-download:hover {
            background: var(--accent-dim);
            box-shadow: var(--accent-glow);
        }

        .loading {
            color: var(--accent);
            font-style: italic;
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .loading::after {
            content: '…';
            animation: dots 1.2s steps(4) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        .error-msg {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.08);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border-left: 4px solid #ff6b6b;
        }

        /* ---------- FOOTER ---------- */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 20px;
            border-top: 1px solid var(--footer-border);
            color: var(--text-muted);
            font-size: 13px;
            transition: border-color 0.3s;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 640px) {
            .header {
                flex-wrap: wrap;
                gap: 12px;
                padding: 14px 18px;
            }
            .nav-links {
                flex-wrap: wrap;
                gap: 10px;
            }
            .theme-toggle .toggle-label {
                display: none;
            }
            .page-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="logo"><span>Deal</span>Guardian</div>
            <div class="nav-links">
                <a href="homepage.html">Home</a>
                <a href="pitch.html" class="active">Pitch Generator</a>
                <a href="legaleagle.html">LegalEagle</a>
                <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" aria-label="Toggle theme">
                    <span class="toggle-label">Theme</span>
                    <div class="toggle-track">
                        <div class="toggle-dot"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- ===== MAIN ===== -->
        <h1 class="page-title">📊 Pitch Generator</h1>
        <p class="page-sub">Paste a company's "About Us" text to generate a professional 3‑sentence pitch.</p>

        <div class="input-area">
            <textarea id="pitchInput" placeholder="Paste company text here… e.g. We are a coffee shop struggling with supply chain costs…"></textarea>
            <button class="btn-primary" id="generateBtn">🚀 Generate Pitch</button>
        </div>

        <!-- Results -->
        <div id="results" class="results">
            <h3>📊 Analysis Results</h3>
            <div id="output"></div>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer">
            Built for Hackathon 2026 — Mock AI demo (no API required)
        </div>
    </div>

    <script>
        (function() {
            // ---------- THEME ----------
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);

            function toggleTheme() {
                const current = html.getAttribute('data-theme');
                const next = (current === 'dark') ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            }
            toggle.addEventListener('click', toggleTheme);
            toggle.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleTheme();
                }
            });

            // ---------- GENERATE PITCH ----------
            const input = document.getElementById('pitchInput');
            const generateBtn = document.getElementById('generateBtn');
            const resultsDiv = document.getElementById('results');
            const outputDiv = document.getElementById('output');

            generateBtn.addEventListener('click', generatePitch);

            function generatePitch() {
                const text = input.value.trim();
                if (!text) {
                    alert('Please paste some company text.');
                    return;
                }

                resultsDiv.classList.add('visible');
                outputDiv.innerHTML = '<div class="loading">⏳ AI is generating your pitch</div>';

                // Simulate async processing
                setTimeout(() => {
                    // Extract mock data based on keywords
                    let industry = 'Technology';
                    let revenue = '$5M – $10M';
                    let painPoints = ['High operational costs', 'Customer retention'];
                    let pitch = 'We help businesses streamline operations with cutting-edge AI solutions. Our platform reduces costs by 30% within the first quarter. Let us transform your company today.';

                    const lower = text.toLowerCase();
                    if (lower.includes('coffee')) {
                        industry = 'Food & Beverage';
                        revenue = '$2M – $5M';
                        painPoints = ['Supply chain disruptions', 'Rising ingredient costs'];
                        pitch = 'We provide smart supply chain management for coffee shops. Our AI predicts demand and reduces waste by 40%. Partner with us to brew success.';
                    } else if (lower.includes('software') || lower.includes('saas')) {
                        industry = 'SaaS / Software';
                        revenue = '$10M – $50M';
                        painPoints = ['Long sales cycles', 'High churn rate'];
                        pitch = 'Our sales automation platform shortens your sales cycle by 45%. We integrate seamlessly with your CRM. Scale your revenue with confidence.';
                    } else if (lower.includes('restaurant') || lower.includes('food')) {
                        industry = 'Hospitality';
                        revenue = '$3M – $8M';
                        painPoints = ['Staff shortages', 'Inventory management'];
                        pitch = 'We optimize restaurant operations with AI-driven scheduling and inventory control. Reduce waste and boost staff productivity. Your restaurant, supercharged.';
                    } else if (lower.includes('ecommerce') || lower.includes('shop')) {
                        industry = 'E‑commerce';
                        revenue = '$8M – $20M';
                        painPoints = ['Cart abandonment', 'Logistics inefficiencies'];
                        pitch = 'Our AI-powered personalization engine boosts conversion rates by 25%. We streamline your logistics for faster delivery. Grow your online store with us.';
                    }

                    outputDiv.innerHTML = `
                        <div class="metric-grid">
                            <div class="metric">
                                <div class="metric-label">🏭 Industry</div>
                                <div class="metric-value">${industry}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">💰 Estimated Revenue</div>
                                <div class="metric-value">${revenue}</div>
                            </div>
                        </div>

                        <p style="font-weight:600; margin-top:8px;">📌 Identified Pain Points</p>
                        <ul class="pain-list">
                            ${painPoints.map(p => `<li>${p}</li>`).join('')}
                        </ul>

                        <p style="font-weight:600; margin-top:16px;">🎤 Generated Pitch</p>
                        <div class="code-block">${pitch}</div>

                        <button class="btn-download" id="downloadBtn">📥 Download Pitch (.txt)</button>
                    `;

                    // Download button
                    const downloadBtn = document.getElementById('downloadBtn');
                    if (downloadBtn) {
                        downloadBtn.addEventListener('click', function() {
                            const content = `Industry: ${industry}\nRevenue: ${revenue}\nPain Points: ${painPoints.join(', ')}\n\nPitch:\n${pitch}`;
                            const blob = new Blob([content], { type: 'text/plain' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'pitch.txt';
                            a.click();
                            URL.revokeObjectURL(url);
                        });
                    }
                }, 1500);
            }

            // Allow Enter key to trigger generate
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    generatePitch();
                }
            });
        })();
    </script>
</body>
</html>
