<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pitch Generator – DealGuardian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-primary: #0c0e14;
            --bg-secondary: #11141c;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.14);
            --text-primary: #eceff4;
            --text-secondary: #9aa2b8;
            --text-muted: #5e667a;
            --accent: #6b7bff;
            --accent-dim: rgba(107, 123, 255, 0.12);
            --accent-glow: 0 12px 40px rgba(107, 123, 255, 0.15);
            --header-bg: rgba(12, 14, 20, 0.85);
            --footer-border: rgba(255, 255, 255, 0.06);
            --radius-lg: 20px;
            --radius-md: 14px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="light"] {
            --bg-primary: #f2f4f8;
            --bg-secondary: #e8ecf2;
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-card-hover: rgba(255, 255, 255, 0.9);
            --bg-input: rgba(255, 255, 255, 0.7);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.16);
            --text-primary: #1a1e2c;
            --text-secondary: #4a5268;
            --text-muted: #7a8298;
            --accent: #4a5bd8;
            --accent-dim: rgba(74, 91, 216, 0.10);
            --accent-glow: 0 12px 40px rgba(74, 91, 216, 0.15);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.06);
            --header-bg: rgba(242, 244, 248, 0.85);
            --footer-border: rgba(0, 0, 0, 0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 1000px; margin: 0 auto; width: 100%; flex: 1; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--header-bg);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo { font-size: 22px; font-weight: 800; color: var(--text-primary); }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-secondary); text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover { color: var(--text-primary); }
        .nav-links a.active { color: var(--accent); font-weight: 700; }
        .btn-outline-nav {
            padding: 6px 18px;
            border-radius: 60px;
            border: 1px solid var(--border-subtle);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        .btn-outline-nav:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .btn-primary-nav {
            padding: 6px 22px;
            border-radius: 60px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary-nav:hover { background: #7b89ff; box-shadow: var(--accent-glow); }
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .theme-toggle .toggle-track {
            width: 40px;
            height: 22px;
            background: var(--bg-card);
            border-radius: 40px;
            position: relative;
            transition: background 0.3s;
            border: 1px solid var(--border-subtle);
        }
        .theme-toggle .toggle-track .toggle-dot {
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background 0.3s;
        }
        [data-theme="light"] .theme-toggle .toggle-track .toggle-dot { transform: translateX(18px); }
        .theme-toggle .toggle-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

        .page-title { font-size: 34px; font-weight: 800; margin-bottom: 4px; color: var(--text-primary); }
        .page-sub { color: var(--text-secondary); font-size: 17px; margin-bottom: 28px; }
        .input-area {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 28px;
            border: 1px solid var(--border-subtle);
            transition: background 0.3s, border-color 0.3s;
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: background 0.3s, border-color 0.3s;
        }
        textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; align-items: center; }
        .row label { font-weight: 600; color: var(--text-secondary); font-size: 14px; }
        .row select {
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }
        .row select:focus { outline: none; border-color: var(--accent); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            padding: 12px 34px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(107, 123, 255, 0.15);
        }
        .btn-primary:hover { background: #7b89ff; transform: translateY(-2px); box-shadow: var(--accent-glow); }
        .loading-bar { width: 100%; height: 4px; background: var(--border-subtle); border-radius: 4px; overflow: hidden; margin-top: 16px; display: none; }
        .loading-bar .fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; border-radius: 4px; }

        .results { margin-top: 32px; padding: 28px; background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); display: none; transition: background 0.3s, border-color 0.3s; }
        .results.visible { display: block; }
        .results h3 { font-size: 22px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary); }
        .metric-grid { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
        .metric { background: var(--bg-card); padding: 14px 22px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); flex: 1 1 auto; min-width: 140px; }
        .metric-label { font-size: 12px; text-transform: uppercase; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; }
        .metric-value { font-size: 22px; font-weight: 800; color: var(--text-primary); margin-top: 2px; }
        .pain-list { margin: 12px 0 20px; padding-left: 20px; color: var(--text-secondary); }
        .pain-list li { margin-bottom: 4px; }
        .pitch-box { background: var(--bg-primary); padding: 18px 22px; border-radius: var(--radius-md); border-left: 5px solid var(--accent); white-space: pre-wrap; font-family: 'Inter', monospace; color: var(--text-primary); font-size: 16px; line-height: 1.7; margin-top: 8px; }
        .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .btn-secondary { background: transparent; color: var(--text-primary); padding: 8px 24px; border: 1px solid var(--border-subtle); border-radius: 60px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .btn-accent { background: var(--accent-dim); color: var(--accent); padding: 8px 24px; border: 1px solid var(--accent); border-radius: 60px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .btn-accent:hover { background: var(--accent); color: #fff; }
        .history-section { margin-top: 40px; border-top: 1px solid var(--border-subtle); padding-top: 24px; }
        .history-section h4 { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
        .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
        .history-item { background: var(--bg-card); padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); font-size: 14px; color: var(--text-secondary); display: flex; justify-content: space-between; align-items: center; }
        .history-item .h-pitch { flex: 1; margin-right: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item .h-date { color: var(--text-muted); font-size: 12px; }
        .history-item .h-delete { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 16px; }
        .error-msg { color: #ff6b6b; background: rgba(255, 107, 107, 0.08); padding: 12px 16px; border-radius: var(--radius-md); border-left: 4px solid #ff6b6b; margin-top: 12px; }
        .footer { text-align: center; margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--footer-border); color: var(--text-muted); font-size: 13px; transition: border-color 0.3s; }
        @media (max-width: 640px) {
            .header { flex-direction: column; align-items: stretch; }
            .nav-links { justify-content: center; }
            .theme-toggle .toggle-label { display: none; }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo"><span>Deal</span>Guardian</div>
            <div class="nav-links">
                <a href="homepage.html">Home</a>
                <a href="#" class="active">Pitch Generator</a>
                <a href="legaleagle.html">LegalEagle</a>
                <div class="theme-toggle" id="themeToggle" role="button" tabindex="0">
                    <span class="toggle-label">Theme</span>
                    <div class="toggle-track"><div class="toggle-dot"></div></div>
                </div>
            </div>
        </header>

        <!-- MAIN -->
        <h1 class="page-title">📊 Pitch Generator</h1>
        <p class="page-sub">Paste a company's "About Us" text. Choose a style. Get a professional pitch.</p>

        <div class="input-area">
            <textarea id="companyText" placeholder="Paste company text here… e.g. We are a coffee shop struggling with supply chain costs…"></textarea>
            <div class="row">
                <label for="styleSelect">Pitch Style:</label>
                <select id="styleSelect">
                    <option value="professional">Professional (B2B)</option>
                    <option value="investor">Investor (VC)</option>
                    <option value="elevator">Elevator (30 sec)</option>
                    <option value="casual">Casual / Networking</option>
                </select>
                <button class="btn-primary" id="generateBtn">🚀 Generate Pitch</button>
            </div>
            <div class="loading-bar" id="loadingBar"><div class="fill" id="loadingFill"></div></div>
        </div>

        <!-- RESULTS -->
        <div id="results" class="results">
            <h3>📊 Analysis &amp; Pitch</h3>
            <div id="output"></div>
            <div class="action-buttons" id="actionButtons" style="display:none;">
                <button class="btn-secondary" id="downloadTxtBtn">📥 Download .txt</button>
                <button class="btn-accent" id="saveHistoryBtn">💾 Save to History</button>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="history-section">
            <h4>📜 Pitch History</h4>
            <div class="history-list" id="historyList"></div>
            <button class="btn-secondary" id="clearHistoryBtn" style="margin-top:12px;">Clear History</button>
        </div>

        <div class="footer">Built for Hackathon 2026 — Mock AI Demo</div>
    </div>

    <script>
        (function() {
            // ---------- THEME ----------
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
            toggle.addEventListener('click', function() {
                const current = html.getAttribute('data-theme');
                const next = (current === 'dark') ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });

            // ---------- DOM refs ----------
            const companyText = document.getElementById('companyText');
            const styleSelect = document.getElementById('styleSelect');
            const generateBtn = document.getElementById('generateBtn');
            const resultsDiv = document.getElementById('results');
            const outputDiv = document.getElementById('output');
            const loadingBar = document.getElementById('loadingBar');
            const loadingFill = document.getElementById('loadingFill');
            const actionButtons = document.getElementById('actionButtons');
            const downloadTxtBtn = document.getElementById('downloadTxtBtn');
            const saveHistoryBtn = document.getElementById('saveHistoryBtn');
            const historyList = document.getElementById('historyList');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');

            let currentPitchData = null;

            // ---------- HISTORY ----------
            function loadHistory() {
                try { return JSON.parse(localStorage.getItem('pitchHistory')) || []; } catch { return []; }
            }
            function saveHistoryToStorage(h) { localStorage.setItem('pitchHistory', JSON.stringify(h)); }
            function renderHistory() {
                const history = loadHistory();
                historyList.innerHTML = '';
                if (history.length === 0) {
                    historyList.innerHTML = '<div style="color:var(--text-muted);">No pitches saved yet.</div>';
                    return;
                }
                history.slice().reverse().forEach((item, index) => {
                    const realIndex = history.length - 1 - index;
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <span class="h-pitch">${item.pitch.substring(0, 80)}${item.pitch.length > 80 ? '…' : ''}</span>
                        <span class="h-date">${item.date}</span>
                        <button class="h-delete" data-index="${realIndex}">✕</button>
                    `;
                    div.querySelector('.h-delete').addEventListener('click', function(e) {
                        e.stopPropagation();
                        const idx = parseInt(this.dataset.index);
                        const hist = loadHistory();
                        hist.splice(idx, 1);
                        saveHistoryToStorage(hist);
                        renderHistory();
                    });
                    historyList.appendChild(div);
                });
            }
            renderHistory();

            // ---------- GENERATE PITCH (Mock AI – Works Offline) ----------
            function generatePitch() {
                const text = companyText.value.trim();
                if (!text) { alert('Please paste some company text.'); return; }
                const style = styleSelect.value;

                resultsDiv.classList.remove('visible');
                loadingBar.style.display = 'block';
                loadingFill.style.width = '0%';

                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 15 + 5;
                    if (progress > 95) progress = 95;
                    loadingFill.style.width = progress + '%';
                }, 150);

                setTimeout(() => {
                    clearInterval(interval);
                    loadingFill.style.width = '100%';
                    setTimeout(() => {
                        loadingBar.style.display = 'none';
                        loadingFill.style.width = '0%';
                    }, 400);

                    // ----- Mock Data -----
                    const lower = text.toLowerCase();
                    let industry = 'Technology';
                    let revenue = '$5M – $10M';
                    let painPoints = ['High operational costs', 'Customer retention'];
                    let pitch = 'We help businesses streamline operations with cutting-edge AI solutions. Our platform reduces costs by 30% within the first quarter. Let us transform your company today.';

                    if (lower.includes('coffee') || lower.includes('cafe') || lower.includes('brew')) {
                        industry = 'Food & Beverage';
                        revenue = '$2M – $5M';
                        painPoints = ['Supply chain disruptions', 'Rising ingredient costs'];
                        pitch = 'We provide smart supply chain management for coffee shops. Our AI predicts demand and reduces waste by 40%. Partner with us to brew success.';
                    } else if (lower.includes('software') || lower.includes('saas') || lower.includes('app')) {
                        industry = 'SaaS / Software';
                        revenue = '$10M – $50M';
                        painPoints = ['Long sales cycles', 'High churn rate'];
                        pitch = 'Our sales automation platform shortens your sales cycle by 45%. We integrate seamlessly with your CRM. Scale your revenue with confidence.';
                    } else if (lower.includes('restaurant') || lower.includes('food') || lower.includes('kitchen')) {
                        industry = 'Hospitality';
                        revenue = '$3M – $8M';
                        painPoints = ['Staff shortages', 'Inventory management'];
                        pitch = 'We optimize restaurant operations with AI-driven scheduling and inventory control. Reduce waste and boost staff productivity. Your restaurant, supercharged.';
                    } else if (lower.includes('ecommerce') || lower.includes('shop') || lower.includes('store')) {
                        industry = 'E‑commerce';
                        revenue = '$8M – $20M';
                        painPoints = ['Cart abandonment', 'Logistics inefficiencies'];
                        pitch = 'Our AI-powered personalization engine boosts conversion rates by 25%. We streamline your logistics for faster delivery. Grow your online store with us.';
                    }

                    // Style variation
                    if (style === 'investor') {
                        pitch = 'We are revolutionizing the ' + industry.toLowerCase() + ' industry with a scalable AI platform. Our solution addresses ' + painPoints[0].toLowerCase() + ' and ' + painPoints[1].toLowerCase() + ' — a $50B market opportunity. We are seeking strategic partners to accelerate our growth.';
                    } else if (style === 'elevator') {
                        pitch = 'We help ' + industry.toLowerCase() + ' companies overcome ' + painPoints[0].toLowerCase() + ' using AI. Our platform delivers measurable results. Let\'s talk.';
                    } else if (style === 'casual') {
                        pitch = 'Hey! We\'re building an AI platform for ' + industry.toLowerCase() + ' companies. We solve ' + painPoints[0].toLowerCase() + ' and ' + painPoints[1].toLowerCase() + '. Would love to chat about how we can help you!';
                    }

                    currentPitchData = {
                        industry,
                        revenue,
                        pain_points: painPoints,
                        pitch,
                        style
                    };

                    outputDiv.innerHTML = `
                        <div class="metric-grid">
                            <div class="metric"><div class="metric-label">🏭 Industry</div><div class="metric-value">${industry}</div></div>
                            <div class="metric"><div class="metric-label">💰 Revenue</div><div class="metric-value">${revenue}</div></div>
                            <div class="metric"><div class="metric-label">🎯 Style</div><div class="metric-value" style="font-size:18px;">${style.charAt(0).toUpperCase() + style.slice(1)}</div></div>
                        </div>
                        <p style="font-weight:600; margin-top:8px;">📌 Pain Points</p>
                        <ul class="pain-list">${painPoints.map(p => `<li>${p}</li>`).join('')}</ul>
                        <p style="font-weight:600; margin-top:16px;">🎤 Generated Pitch</p>
                        <div class="pitch-box">${pitch}</div>
                    `;
                    resultsDiv.classList.add('visible');
                    actionButtons.style.display = 'flex';
                    resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 2000);
            }

            generateBtn.addEventListener('click', generatePitch);

            // Ctrl+Enter shortcut
            companyText.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    generatePitch();
                }
            });

            // ---------- DOWNLOAD .TXT ----------
            downloadTxtBtn.addEventListener('click', function() {
                if (!currentPitchData) return;
                const content =
                    `PITCH GENERATOR – DealGuardian\n\nStyle: ${currentPitchData.style}\nIndustry: ${currentPitchData.industry}\nRevenue: ${currentPitchData.revenue}\nPain Points: ${(currentPitchData.pain_points || []).join(', ')}\n\nPitch:\n${currentPitchData.pitch}`;
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'pitch.txt';
                a.click();
                URL.revokeObjectURL(url);
            });

            // ---------- SAVE TO HISTORY ----------
            saveHistoryBtn.addEventListener('click', function() {
                if (!currentPitchData) return;
                const history = loadHistory();
                history.push({
                    pitch: currentPitchData.pitch,
                    industry: currentPitchData.industry,
                    revenue: currentPitchData.revenue,
                    style: currentPitchData.style,
                    date: new Date().toLocaleString()
                });
                saveHistoryToStorage(history);
                renderHistory();
                alert('✅ Pitch saved to history!');
            });

            // ---------- CLEAR HISTORY ----------
            clearHistoryBtn.addEventListener('click', function() {
                if (confirm('Clear all saved pitches?')) {
                    saveHistoryToStorage([]);
                    renderHistory();
                }
            });
        })();
    </script>
</body>
</html>
